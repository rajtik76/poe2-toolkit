name: Release

# Publishes the @poe2-toolkit packages to npm when a GitHub Release is published.
# Bump the version(s) you want to ship, then cut a Release (or push a tag and
# publish a release from it). Only packages whose version is not yet on npm are
# published, so partial releases are safe.
#
# One-time setup: add an automation npm token as the repo secret NPM_TOKEN
# (npmjs.com -> Access Tokens -> Generate -> "Automation"). It needs publish
# rights on the @poe2-toolkit scope.
on:
  release:
    types: [published]

permissions:
  contents: read

# Releases publish to npm. Serialize them so several tags published together
# don't race to publish a shared dependency package (which 403s on the version a
# sibling run just shipped). Never cancel an in-flight release mid-publish — let
# them queue and run one at a time.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: node scripts/publish-changed.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
